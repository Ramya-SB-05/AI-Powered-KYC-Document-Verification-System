<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KYC Document Verification</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>🏦 AI-Powered KYC Document Verification</h1>
    <p class="subtitle">Upload identity documents for automated verification</p>

    <form action="/verify" method="post" enctype="multipart/form-data">

        <div class="field">
            <label>Government ID (Aadhaar / PAN)</label>
            <input type="file" name="id_doc" required>
        </div>

        <div class="field">
            <label>Bank Statement</label>
            <input type="file" name="bank_doc" required>
        </div>

        <div class="field">
            <label>Employment Letter (Optional)</label>
            <input type="file" name="employment_doc">
        </div>

        <button type="submit">Verify Documents</button>

    </form>
</div>

</body>
</html>
